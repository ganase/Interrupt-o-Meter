<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interrupt-o-Meter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card">
        <p class="eyebrow">Joke Vision App</p>
        <h1>Interrupt-o-Meter</h1>
        <p class="lead">
          カメラや画像・動画を読み込み、AIが「今なら話しかけてよさそう度」を雑に判定します。
        </p>
        <p class="subtle">
          ジョーク用途です。人生判断、業務判断、人事判断には使わないでください。
        </p>
      </section>

      <section class="workspace">
        <section class="card signal-panel">
          <div class="section-title">
            <h2>信号</h2>
            <p>赤・黄・青で表示</p>
          </div>

          <div class="traffic-light" id="trafficLight">
            <div class="lamp lamp-red"></div>
            <div class="lamp lamp-yellow"></div>
            <div class="lamp lamp-blue"></div>
          </div>
        </section>

        <section class="card metrics-panel">
          <div class="section-title">
            <h2>Score / Confidence</h2>
            <p>判定の強さと確信度</p>
          </div>

          <div class="score-wrap">
            <div>
              <p class="metric-label">Interrupt Score</p>
              <p id="scoreValue" class="metric-value">--</p>
            </div>
            <div>
              <p class="metric-label">Confidence</p>
              <p id="confidenceValue" class="metric-small">--</p>
            </div>
          </div>
        </section>

        <section class="card controls">
          <div class="section-title">
            <h2>操作ボタン</h2>
            <p>カメラかファイルを選択</p>
          </div>

          <div class="button-row">
            <button id="startCameraButton" class="button primary">カメラ開始</button>
            <button id="stopCameraButton" class="button ghost" disabled>停止</button>
            <button id="captureButton" class="button ghost" disabled>今のフレームを固定</button>
          </div>

          <label class="upload">
            <span>画像または動画を読み込む</span>
            <input id="fileInput" type="file" accept="image/*,video/*" />
          </label>

          <div id="videoScrubberWrap" class="scrubber hidden">
            <label for="videoScrubber">動画フレーム位置</label>
            <input id="videoScrubber" type="range" min="0" max="1" step="0.01" value="0" />
          </div>

          <div class="button-row">
            <button id="analyzeButton" class="button accent" disabled>AIで判定</button>
            <button id="autoAnalyzeButton" class="button ghost" disabled>実況モード OFF</button>
          </div>

          <label class="interval-control" for="autoAnalyzeIntervalInput">
            <span>実況モード間隔（秒）</span>
            <input
              id="autoAnalyzeIntervalInput"
              type="number"
              min="2"
              step="1"
              value="30"
              inputmode="numeric"
            />
          </label>
        </section>

        <section class="card preview-panel">
          <div class="section-title">
            <h2>カメラ画像</h2>
            <p id="sourceLabel">ソース未選択</p>
          </div>

          <div class="preview-frame">
            <video id="cameraPreview" playsinline autoplay muted class="media hidden"></video>
            <video id="uploadVideo" controls playsinline class="media hidden"></video>
            <img id="imagePreview" alt="preview" class="media hidden" />
            <div id="emptyPreview" class="empty-state">
              ここにカメラ映像または選択したメディアが表示されます
            </div>
          </div>
        </section>

        <section class="card details-panel">
          <div class="section-title">
            <h2>その他</h2>
            <p>補足コメントとステータス</p>
          </div>

          <p id="headline" class="headline">判定待ち</p>
          <ul id="reasons" class="reasons"></ul>
          <p id="playfulSuggestion" class="callout"></p>
          <p id="caution" class="subtle"></p>
          <p id="statusMessage" class="status">AI待機中</p>
        </section>
      </section>
    </main>

    <canvas id="workingCanvas" class="hidden"></canvas>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
